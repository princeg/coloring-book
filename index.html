<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#ffb784" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>Saira's Coloring Book</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden;
    font-family:"Chalkboard SE","Comic Sans MS",ui-rounded,system-ui,sans-serif;
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    touch-action:none; overscroll-behavior:none; background:#fff3e9; }
  .screen { position:fixed; inset:0; }
  .hidden { display:none !important; }

  /* ---------- Gallery ---------- */
  #gallery { background:radial-gradient(120% 90% at 50% 0%, #fff6ee 0%, #ffe6d2 55%, #ffd9bf 100%);
    overflow-y:auto; -webkit-overflow-scrolling:touch; padding:max(14px,2.5vw); }
  #gallery h1 { text-align:center; color:#ff7a3d; margin:.2em 0 .5em; font-size:min(6vw,40px); text-shadow:0 2px 0 #fff; }
  .floatbtn { position:absolute; top:min(2.5vw,18px); right:min(2.5vw,18px); z-index:50;
    width:min(11vw,58px); height:min(11vw,58px); border:none; border-radius:50%; cursor:pointer;
    background:#fff; box-shadow:0 4px 0 rgba(0,0,0,.15); font-size:min(6vw,30px); }
  .floatbtn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.15); }
  #reelWrap { max-width:1300px; margin:0 auto min(2vh,16px); }
  .reelTitle { color:#ff7a3d; text-align:center; margin:.1em 0 .35em; font-size:min(4.6vw,26px); text-shadow:0 2px 0 #fff; }
  .reel { overflow:hidden;
    -webkit-mask-image:linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
            mask-image:linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent); }
  .reelTrack { display:flex; gap:min(2vw,16px); width:max-content; }
  .reelTrack:active { animation-play-state:paused; }
  .reelItem { position:relative; flex:0 0 auto; height:min(20vh,148px); aspect-ratio:1; background:#fff;
    border:3px solid #bfe3ff; border-radius:16px; overflow:hidden; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.08); padding:6%; }
  .reelColor { position:absolute; inset:6%; width:88%; height:88%; object-fit:contain; z-index:0; }
  .reelOutline { position:absolute; inset:6%; width:88%; height:88%; z-index:1; pointer-events:none; }
  .reelOutline svg { width:100%; height:100%; }
  @keyframes marquee { from{ transform:translateX(0);} to{ transform:translateX(-50%);} }
  #grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:min(2.6vw,22px); max-width:1300px; margin:0 auto; }
  @media (orientation:portrait){ #grid{ grid-template-columns:repeat(3,1fr); } }
  .card { position:relative; background:#fff; border:4px solid #bfe3ff; border-radius:22px; aspect-ratio:1;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.08); transition:transform .1s ease; padding:8%; overflow:hidden; }
  .card:active { transform:scale(.95); }
  .card svg { position:relative; z-index:1; width:100%; height:100%; }
  .card .thumbColor { position:absolute; inset:8%; width:84%; height:84%; object-fit:contain; z-index:0; }

  /* ---------- Studio: [left tools] [canvas] [color strip] ---------- */
  #studio { display:flex; align-items:stretch; gap:min(1.6vw,16px);
    background:radial-gradient(120% 120% at 30% 0%, #ffd2ad 0%, #ffb784 60%, #ff9f63 100%);
    padding:min(1.6vw,16px); }

  #leftbar { width:min(15vw,104px); display:flex; flex-direction:column; align-items:center;
    gap:min(1.2vh,10px); overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .iconbtn { width:100%; aspect-ratio:1; max-height:min(12.5vh,92px); flex:0 0 auto; border:none; border-radius:22px;
    cursor:pointer; background:#fff; box-shadow:0 4px 0 rgba(0,0,0,.14); font-family:inherit; color:#555;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
  .iconbtn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.14); }
  .iconbtn.active { background:#ffe2cc; box-shadow:0 0 0 3px #ff9f63; }
  .iconbtn svg { width:44%; height:44%; }
  .iconbtn span { font-size:min(1.5vh,13px); }
  .iconbtn.back { background:#6c5ce7; box-shadow:0 4px 0 #4b3fb0; }
  .iconbtn.back svg { width:52%; height:52%; }
  .iconbtn.save { background:#34c759; color:#fff; box-shadow:0 4px 0 #229544; }

  .sizecol { width:100%; flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:min(.9vh,7px);
    background:rgba(255,255,255,.5); border-radius:20px; padding:min(1vh,8px) 0; }
  .sizeBtn { width:72%; aspect-ratio:1; max-height:min(7.5vh,54px); border-radius:50%; border:none; cursor:pointer;
    background:#fff; box-shadow:0 3px 0 rgba(0,0,0,.12); display:flex; align-items:center; justify-content:center; }
  .sizeBtn.active { background:#ffe2cc; box-shadow:0 0 0 3px #ff9f63; }
  .sizeBtn .dot { background:#444; border-radius:50%; }

  #stage { position:relative; flex:1; align-self:center; aspect-ratio:1; max-height:100%; max-width:100%;
    background:#fff; border-radius:24px; box-shadow:0 14px 34px rgba(0,0,0,.22); overflow:hidden; }
  #paint { position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  #outline { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  #outline svg { width:100%; height:100%; }

  /* Right color spectrum strip, docked in the corner */
  #palette { width:min(17vw,132px); height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch;
    display:grid; grid-template-columns:1fr 1fr; gap:5px; align-content:start;
    background:rgba(255,255,255,.5); border-radius:18px; padding:6px; }
  .swatch { aspect-ratio:1; border-radius:7px; cursor:pointer; border:2px solid rgba(0,0,0,.10); }
  .swatch.active { border:3px solid #222; box-shadow:0 0 0 2px #fff, 0 0 0 4px #ff9f63; }
  .swatch.special { border-radius:50%; border-color:rgba(0,0,0,.18); }

  #toast { position:absolute; bottom:8%; left:50%; transform:translateX(-50%) translateY(10px);
    background:rgba(40,40,40,.92); color:#fff; padding:.5em 1.3em; border-radius:999px;
    font-size:min(3vh,22px); opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:20; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ===================== GALLERY ===================== -->
<div id="gallery" class="screen">
  <button id="musicBtnG" class="floatbtn" title="Music">&#x1F3B5;</button>
  <h1>Pick a picture to color!</h1>
  <div id="reelWrap" class="hidden">
    <h2 class="reelTitle">&#x1F3A8; My Colorings</h2>
    <div class="reel"><div class="reelTrack" id="reelTrack"></div></div>
  </div>
  <div id="grid"></div>
</div>

<!-- ===================== STUDIO ===================== -->
<div id="studio" class="screen hidden">
  <div id="leftbar">
    <button class="iconbtn back" id="backBtn" title="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 L8 12 L15 19"/></svg>
    </button>
    <div id="sizes" class="sizecol"></div>
    <button class="iconbtn" id="eraserBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2" stroke-linejoin="round"><path d="M4 16 L12 8 l6 6 -5 5 H7 Z"/><path d="M12 8 l4 -4 4 4 -4 4"/></svg>
      <span>Eraser</span>
    </button>
    <button class="iconbtn" id="undoBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 7 L4 12 L9 17"/><path d="M4 12 H14 a6 6 0 0 1 0 12 H11"/></svg>
      <span>Undo</span>
    </button>
    <button class="iconbtn" id="clearBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7 H19 M9 7 V5 H15 V7 M7 7 L8 20 H16 L17 7"/></svg>
      <span>Clear</span>
    </button>
    <button class="iconbtn save" id="saveBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round"><path d="M5 4 H16 L20 8 V20 H5 Z"/><path d="M8 4 V9 H15 V4"/><rect x="8" y="13" width="8" height="6"/></svg>
      <span>Save</span>
    </button>
    <button class="iconbtn active" id="musicBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="18" r="2.4"/><circle cx="17" cy="16" r="2.4"/><path d="M9.4 18 V6 L19.4 4 V16"/></svg>
      <span>Music</span>
    </button>
  </div>

  <div id="stage">
    <canvas id="paint"></canvas>
    <div id="outline"></div>
  </div>

  <div id="palette"></div>

  <div id="toast"></div>
</div>

    { name:"Summer", svg:S(`<path d="M16 72 A34 34 0 0 1 84 72"/><path d="M23 72 A27 27 0 0 1 77 72"/><path d="M30 72 A20 20 0 0 1 70 72"/><circle cx="50" cy="40" r="8"/><path d="M50 26 V30 M50 50 V54 M34 40 H38 M62 40 H66 M39 29 L42 32 M61 29 L58 32"/><path d="M30 80 Q24 80 24 74 Q24 68 32 69 Q34 64 42 66 Q46 62 52 66 Q60 65 60 72 Q66 72 66 78 Z"/><path d="M36 84 q-2 3 0 4 q2 -1 0 -4"/><path d="M50 86 q-2 3 0 4 q2 -1 0 -4"/><path d="M64 84 q-2 3 0 4 q2 -1 0 -4"/>`) },
    { name:"Puppy", svg:S(`<circle cx="50" cy="42" r="18"/><path d="M32 36 Q24 38 26 54 Q34 54 36 44 Z"/><path d="M68 36 Q76 38 74 54 Q66 54 64 44 Z"/><circle cx="43" cy="42" r="3"/><circle cx="57" cy="42" r="3"/><circle cx="43" cy="42" r="1"/><circle cx="57" cy="42" r="1"/><ellipse cx="50" cy="52" rx="8" ry="6"/><ellipse cx="50" cy="49" rx="3" ry="2"/><path d="M50 51 V55 M50 55 Q46 57 44 55 M50 55 Q54 57 56 55"/><path d="M38 58 Q34 76 44 82 H58 Q66 76 62 58"/><ellipse cx="44" cy="82" rx="5" ry="3"/><ellipse cx="58" cy="82" rx="5" ry="3"/><path d="M62 68 Q74 66 72 56"/><circle cx="60" cy="44" r="5"/>`) },
    { name:"Ladybug", svg:S(`<circle cx="30" cy="68" r="6"/><circle cx="30" cy="58" r="6"/><circle cx="40" cy="63" r="6"/><circle cx="20" cy="63" r="6"/><circle cx="30" cy="63" r="3"/><path d="M30 74 V90"/><path d="M30 82 Q40 80 42 72"/><ellipse cx="62" cy="46" rx="18" ry="15"/><path d="M62 31 V61"/><circle cx="62" cy="30" r="6"/><path d="M59 25 L56 20 M65 25 L68 20"/><circle cx="54" cy="42" r="2.5"/><circle cx="70" cy="42" r="2.5"/><circle cx="54" cy="52" r="2.5"/><circle cx="70" cy="52" r="2.5"/><path d="M47 42 L41 40 M47 47 L41 49 M77 42 L83 40 M77 47 L83 49"/>`) },
    { name:"Robot", svg:S(`<rect x="38" y="16" width="24" height="20" rx="3"/><circle cx="45" cy="26" r="3"/><circle cx="55" cy="26" r="3"/><path d="M44 32 H56"/><path d="M50 16 V10"/><circle cx="50" cy="8" r="2"/><rect x="34" y="40" width="32" height="30" rx="3"/><circle cx="50" cy="50" r="4"/><rect x="42" y="58" width="16" height="8"/><path d="M44 61 H56 M44 64 H56"/><rect x="24" y="42" width="8" height="20" rx="3"/><rect x="68" y="42" width="8" height="20" rx="3"/><rect x="40" y="72" width="8" height="14" rx="2"/><rect x="52" y="72" width="8" height="14" rx="2"/>`) },
  ];

  // ---------- Colors & sizes ----------
  // Full spectrum: grayscale ramp + hue families, each in light->dark shades
  const COLORS = [];
  [100, 86, 72, 58, 42, 26, 10, 0].forEach(l => COLORS.push(`hsl(0 0% ${l}%)`));
  const HUES = [0, 16, 32, 48, 90, 140, 168, 198, 222, 252, 282, 318, 344];
  HUES.forEach(h => [84, 70, 56, 44, 30].forEach(l => COLORS.push(`hsl(${h} 85% ${l}%)`)));
  const DEFAULT_INDEX = 10; // a nice medium red (after the 8 grays)
  const SIZES = [8, 16, 28, 46];
  const SPRINKLE_COLORS = ["#ff3b30","#ff9500","#ffcc00","#34c759","#1e88ff","#9c27b0","#ff2d92","#00bcd4","#ffffff"];
  // Special glitter brushes Saira likes
  const SPECIALS = [
    { id:"rainbow",        bg:"linear-gradient(135deg,#ff3b30,#ff9500,#ffd000,#34c759,#1e88ff,#9c27b0)" },
    { id:"rainbowsparkle", bg:"radial-gradient(circle at 50% 32%, #fff 0 16%, rgba(255,255,255,0) 17%), conic-gradient(#ff3b30,#ffcc00,#34c759,#1e88ff,#9c27b0,#ff2d92,#ff3b30)" },
    { id:"sparkle",        bg:"radial-gradient(circle at 50% 38%, #ffffff, #fff0a6 45%, #ffd700 78%)" },
    { id:"sprinkle",       bg:"conic-gradient(#ff3b30,#ff9500,#ffcc00,#34c759,#1e88ff,#9c27b0,#ff2d92,#ff3b30)" },
  ];

  // ---------- Canvas ----------
  const RES = 1200;
  const canvas = document.getElementById("paint");
  const ctx = canvas.getContext("2d");
  canvas.width = RES; canvas.height = RES;

  let curColor = "#ff3b30", curSize = 16, erasing = false, brushMode = "solid";
  let drawing = false, drawPid = null, last = null;
  const undoStack = [];

  function fillWhite(){ ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,RES,RES); }
  function pushUndo(){
    try { undoStack.push(ctx.getImageData(0,0,RES,RES)); if(undoStack.length>12) undoStack.shift(); } catch(e){}
  }
  function undo(){ const img = undoStack.pop(); if(img) ctx.putImageData(img,0,0); }
  function clearAll(){ pushUndo(); fillWhite(); }

  function pos(e){
    const r = canvas.getBoundingClientRect();
    return { x:(e.clientX - r.left) * (RES / r.width), y:(e.clientY - r.top) * (RES / r.height) };
  }
  let strokeOverride = null, rainbowHue = 0;
  function nextRainbow(){ rainbowHue = (rainbowHue + 10) % 360; return `hsl(${rainbowHue} 90% 55%)`; }
  function paintStyle(){
    const col = erasing ? "#ffffff" : (strokeOverride || curColor);
    ctx.strokeStyle = col; ctx.fillStyle = col;
    ctx.lineWidth   = erasing ? curSize*1.7 : curSize;
    ctx.lineCap = "round"; ctx.lineJoin = "round";
  }
  function dotSolid(p){ paintStyle(); ctx.beginPath(); ctx.arc(p.x, p.y, ctx.lineWidth/2, 0, Math.PI*2); ctx.fill(); }
  function segSolid(a,b){ paintStyle(); ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }

  // ---- Glitter brushes ----
  function depositAlong(a,b,fn){
    const dx=b.x-a.x, dy=b.y-a.y, dist=Math.hypot(dx,dy);
    const step=Math.max(2, curSize*0.5), n=Math.max(1, Math.floor(dist/step));
    for(let i=0;i<=n;i++){ const t=i/n; fn(a.x+dx*t, a.y+dy*t); }
  }
  function star(x,y,s){
    ctx.beginPath();
    ctx.moveTo(x,y-s); ctx.lineTo(x+s*0.3,y-s*0.3); ctx.lineTo(x+s,y); ctx.lineTo(x+s*0.3,y+s*0.3);
    ctx.lineTo(x,y+s); ctx.lineTo(x-s*0.3,y+s*0.3); ctx.lineTo(x-s,y); ctx.lineTo(x-s*0.3,y-s*0.3);
    ctx.closePath(); ctx.fill();
  }
  const SPARKLE_SPECK = ["#ffffff","#fff3b0","#ffd700","#ffffff"];
  function sparkleAt(x,y){
    const r = curSize;
    for(let k=0;k<2;k++){
      const ang=Math.random()*6.283, rad=Math.random()*r;
      ctx.fillStyle = SPARKLE_SPECK[(Math.random()*SPARKLE_SPECK.length)|0];
      star(x+Math.cos(ang)*rad, y+Math.sin(ang)*rad, 1 + Math.random()*(curSize*0.16+1));
    }
  }
  function roundRect(x,y,w,h,r){
    ctx.beginPath(); ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }
  function sprinkleAt(x,y){
    if(Math.random() > 0.6) return; // space them out like real sprinkles
    const len=Math.max(4,curSize*0.7), w=Math.max(2,curSize*0.28);
    ctx.save();
    ctx.translate(x+(Math.random()-.5)*curSize, y+(Math.random()-.5)*curSize);
    ctx.rotate(Math.random()*Math.PI);
    ctx.fillStyle = SPRINKLE_COLORS[(Math.random()*SPRINKLE_COLORS.length)|0];
    roundRect(-len/2,-w/2,len,w,w/2); ctx.fill();
    ctx.restore();
  }

  function rainbowDot(x,y){
    strokeOverride = nextRainbow();
    ctx.fillStyle = strokeOverride;
    ctx.beginPath(); ctx.arc(x, y, curSize/2, 0, Math.PI*2); ctx.fill();
    strokeOverride = null;
    if(brushMode==="rainbowsparkle") sparkleAt(x,y);
  }
  function paintDot(p){
    if(erasing){ dotSolid(p); return; }
    if(brushMode==="sprinkle"){ sprinkleAt(p.x,p.y); return; }
    if(brushMode==="rainbow" || brushMode==="rainbowsparkle"){ rainbowDot(p.x,p.y); return; }
    dotSolid(p);
    if(brushMode==="sparkle") sparkleAt(p.x,p.y);
  }
  function paintSeg(a,b){
    if(erasing){ segSolid(a,b); return; }
    if(brushMode==="sprinkle"){ depositAlong(a,b,sprinkleAt); return; }
    if(brushMode==="rainbow" || brushMode==="rainbowsparkle"){ depositAlong(a,b,rainbowDot); return; }
    segSolid(a,b);
    if(brushMode==="sparkle") depositAlong(a,b,sparkleAt);
  }

  canvas.addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    if(drawing) return;
    drawing = true; drawPid = e.pointerId;
    pushUndo();
    try{ canvas.setPointerCapture(e.pointerId); }catch(_){}
    last = pos(e); paintDot(last);
  });
  canvas.addEventListener("pointermove", (e)=>{
    if(!drawing || e.pointerId !== drawPid) return;
    e.preventDefault();
    const p = pos(e); paintSeg(last, p); last = p;
  });
  function endDraw(e){
    if(!drawing || (e && e.pointerId !== drawPid)) return;
    drawing = false; drawPid = null; last = null;
    scheduleAutosave();
  }
  canvas.addEventListener("pointerup", endDraw);
  canvas.addEventListener("pointercancel", endDraw);

  // ---------- Saved coloring (localStorage) ----------
  let currentIndex = 0;
  function thumbKey(i){ return "saira-coloring:" + PICTURES[i].name; }
  function refreshCard(i){
    const card = cardEls[i];
    const data = localStorage.getItem(thumbKey(i));
    let img = card.querySelector(".thumbColor");
    if(data){
      if(!img){ img = document.createElement("img"); img.className = "thumbColor"; card.insertBefore(img, card.firstChild); }
      img.src = data;
    } else if(img){ img.remove(); }
  }

  // Scrolling reel of previously colored pages on the home screen.
  // Only pictures actually colored (>= MIN_COV of the page painted) appear here.
  const MIN_COV = 0.01;
  function coverageOf(i, dataURL){
    return new Promise((res)=>{
      const stored = localStorage.getItem(thumbKey(i) + ":cov");
      if(stored != null){ res(parseFloat(stored)); return; }
      const img = new Image();
      img.onload = ()=>{
        const N = 80, c = document.createElement("canvas"); c.width = N; c.height = N;
        const cc = c.getContext("2d"); cc.drawImage(img, 0, 0, N, N);
        const d = cc.getImageData(0, 0, N, N).data; let nw = 0;
        for(let p=0; p<d.length; p+=4){ if(!(d[p]>245 && d[p+1]>245 && d[p+2]>245)) nw++; }
        const cov = nw/(N*N);
        try{ localStorage.setItem(thumbKey(i) + ":cov", cov.toFixed(4)); }catch(e){}
        res(cov);
      };
      img.onerror = ()=> res(0);
      img.src = dataURL;
    });
  }
  async function buildReel(){
    const wrap = document.getElementById("reelWrap");
    const track = document.getElementById("reelTrack");
    const saved = [];
    PICTURES.forEach((p,i)=>{ const d = localStorage.getItem(thumbKey(i)); if(d) saved.push({ i, d }); });
    const covs = await Promise.all(saved.map(o => coverageOf(o.i, o.d)));
    const colored = saved.filter((o,k)=> covs[k] >= MIN_COV);
    if(colored.length === 0){ wrap.classList.add("hidden"); track.innerHTML = ""; return; }
    wrap.classList.remove("hidden");
    const make = (o)=>{
      const el = document.createElement("div"); el.className = "reelItem";
      const img = document.createElement("img"); img.className = "reelColor"; img.src = o.d;
      const out = document.createElement("div"); out.className = "reelOutline"; out.innerHTML = PICTURES[o.i].svg;
      el.appendChild(img); el.appendChild(out);
      el.addEventListener("click", ()=> openPicture(o.i));
      return el;
    };
    track.innerHTML = "";
    track.style.animation = "none"; track.style.width = ""; track.style.justifyContent = "";
    colored.forEach(o => track.appendChild(make(o)));   // one entry per colored drawing
    requestAnimationFrame(()=>{
      const reel = track.parentElement;
      if(track.scrollWidth > reel.clientWidth + 4){
        colored.forEach(o => track.appendChild(make(o)));   // 2nd copy = seamless loop
        track.style.width = "max-content";
        track.style.justifyContent = "flex-start";
        track.style.animation = "marquee " + Math.max(16, colored.length * 6) + "s linear infinite";
      } else {
        track.style.width = "100%";
        track.style.justifyContent = "center";
      }
    });
  }

  // ---------- Build gallery ----------
  const grid = document.getElementById("grid");
  const cardEls = [];
  PICTURES.forEach((pic, i)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = pic.svg;
    card.addEventListener("click", ()=> openPicture(i));
    grid.appendChild(card); cardEls.push(card);
    refreshCard(i);
  });

  // ---------- Build palette ----------
  const palette = document.getElementById("palette");
  let swatchEls = [], specialEls = [];
  SPECIALS.forEach((sp)=>{
    const s = document.createElement("div");
    s.className = "swatch special"; s.style.background = sp.bg; s.title = sp.id;
    s.addEventListener("click", ()=> pickSpecial(sp.id, s));
    palette.appendChild(s); specialEls.push(s);
  });
  COLORS.forEach((c)=>{
    const s = document.createElement("div");
    s.className = "swatch"; s.style.background = c;
    s.addEventListener("click", ()=> pickColor(c, s));
    palette.appendChild(s); swatchEls.push(s);
  });
  function clearSwatchActive(){ swatchEls.forEach(x=>x.classList.remove("active")); specialEls.forEach(x=>x.classList.remove("active")); }
  function pickColor(c, el){
    curColor = c; erasing = false; brushMode = "solid";
    clearSwatchActive(); el.classList.add("active");
    document.getElementById("eraserBtn").classList.remove("active");
  }
  function pickSpecial(id, el){
    brushMode = id; erasing = false;
    clearSwatchActive(); el.classList.add("active");
    document.getElementById("eraserBtn").classList.remove("active");
  }

  // ---------- Build sizes ----------
  const sizes = document.getElementById("sizes");
  let sizeEls = [];
  SIZES.forEach((sz)=>{
    const b = document.createElement("button");
    b.className = "sizeBtn";
    const d = document.createElement("div");
    d.className = "dot";
    const px = Math.max(8, sz * 0.7);
    d.style.width = px + "px"; d.style.height = px + "px";
    b.appendChild(d);
    b.addEventListener("click", ()=> pickSize(sz, b));
    sizes.appendChild(b); sizeEls.push(b);
  });
  function pickSize(sz, el){
    curSize = sz;
    sizeEls.forEach(x=> x.classList.remove("active"));
    el.classList.add("active");
  }

  // ---------- Tool buttons ----------
  const eraserBtn = document.getElementById("eraserBtn");
  eraserBtn.addEventListener("click", ()=>{
    erasing = true;
    eraserBtn.classList.add("active");
    clearSwatchActive();
  });
  document.getElementById("undoBtn").addEventListener("click", undo);
  document.getElementById("clearBtn").addEventListener("click", clearAll);
  document.getElementById("backBtn").addEventListener("click", ()=>{
    saveCurrent(true);        // auto-save on the way out
    studioOpen = false;
    buildReel();
    document.getElementById("studio").classList.add("hidden");
    document.getElementById("gallery").classList.remove("hidden");
  });

  // ---------- Save / Auto-save ----------
  let toastT = null, studioOpen = false, autosaveT = null;
  function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(()=> t.classList.remove("show"), 1200);
  }
  function paintedCoverage(){
    const N = 100, c = document.createElement("canvas"); c.width = N; c.height = N;
    const cc = c.getContext("2d"); cc.drawImage(canvas, 0, 0, N, N);
    const d = cc.getImageData(0, 0, N, N).data; let nw = 0;
    for(let p=0; p<d.length; p+=4){ if(!(d[p]>245 && d[p+1]>245 && d[p+2]>245)) nw++; }
    return nw / (N*N);
  }
  function saveCurrent(silent){
    try{
      localStorage.setItem(thumbKey(currentIndex), canvas.toDataURL("image/jpeg", 0.82));
      localStorage.setItem(thumbKey(currentIndex) + ":cov", paintedCoverage().toFixed(4));
      refreshCard(currentIndex);
      if(!silent) showToast("Saved!");
    }catch(e){ if(!silent) showToast("Couldn't save — storage full"); }
  }
  function scheduleAutosave(){ if(!studioOpen) return; clearTimeout(autosaveT); autosaveT = setTimeout(()=> saveCurrent(true), 600); }
  document.getElementById("saveBtn").addEventListener("click", ()=> saveCurrent(false));
  window.addEventListener("pagehide", ()=>{ if(studioOpen) saveCurrent(true); });
  document.addEventListener("visibilitychange", ()=>{ if(document.hidden && studioOpen) saveCurrent(true); });

  // ---------- Vibey background music (generated, offline-friendly) ----------
  let actx = null, musicOn = true, musicTimer = null, musicGain = null, mStep = 0;
  function ensureAudio(){
    if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(actx && actx.state === "suspended") actx.resume();
  }
  const PROG = [ [220,277,330], [196,247,294], [175,220,262], [196,247,330] ]; // gentle lo-fi loop
  function mNote(freq, dur, vol, type){
    if(!actx || !musicGain) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || "sine"; o.frequency.value = freq;
    const t = actx.currentTime;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t+0.06);
    g.gain.exponentialRampToValueAtTime(0.0008, t+dur);
    o.connect(g); g.connect(musicGain);
    o.start(t); o.stop(t+dur+0.05);
  }
  function startMusic(){
    if(!actx || musicTimer) return;
    musicGain = actx.createGain();
    musicGain.gain.value = musicOn ? 0.05 : 0.0;
    musicGain.connect(actx.destination);
    mStep = 0;
    musicTimer = setInterval(()=>{
      const chord = PROG[Math.floor(mStep/4) % PROG.length];
      mNote(chord[mStep % chord.length] * 2, 0.7, 0.5, "triangle");      // soft bell arpeggio
      if(mStep % 4 === 0) chord.forEach(f => mNote(f, 2.2, 0.22, "sine")); // warm pad chord
      mStep++;
    }, 320);
  }
  function setMusic(on){
    musicOn = on;
    if(musicGain) musicGain.gain.value = on ? 0.05 : 0.0;
    document.getElementById("musicBtn").classList.toggle("active", on);
    const g = document.getElementById("musicBtnG");
    if(g) g.innerHTML = on ? "&#x1F3B5;" : "&#x1F507;";
  }
  function toggleMusic(){ ensureAudio(); if(!musicTimer) startMusic(); setMusic(!musicOn); }
  document.getElementById("musicBtn").addEventListener("click", toggleMusic);
  document.getElementById("musicBtnG").addEventListener("click", toggleMusic);

  // ---------- Open a picture ----------
  function openPicture(i){
    currentIndex = i;
    ensureAudio(); if(!musicTimer) startMusic();
    document.getElementById("outline").innerHTML = PICTURES[i].svg;
    fillWhite();
    undoStack.length = 0;
    // restore previously saved coloring for this picture, if any
    const data = localStorage.getItem(thumbKey(i));
    if(data){ const img = new Image(); img.onload = ()=> ctx.drawImage(img, 0, 0, RES, RES); img.src = data; }
    // default tool state
    erasing = false;
    pickColor(COLORS[DEFAULT_INDEX], swatchEls[DEFAULT_INDEX]);
    pickSize(SIZES[1], sizeEls[1]);
    document.getElementById("gallery").classList.add("hidden");
    document.getElementById("studio").classList.remove("hidden");
    studioOpen = true;
  }

  // initial selected states (in case studio shown without openPicture)
  swatchEls[DEFAULT_INDEX].classList.add("active");
  sizeEls[1].classList.add("active");
  fillWhite();

  // Clean up saved data for pictures that no longer exist
  (function cleanupStorage(){
    const valid = new Set();
    PICTURES.forEach(p => { valid.add("saira-coloring:" + p.name); valid.add("saira-coloring:" + p.name + ":cov"); });
    const drop = [];
    for(let i=0; i<localStorage.length; i++){
      const k = localStorage.key(i);
      if(k && k.indexOf("saira-coloring:") === 0 && !valid.has(k)) drop.push(k);
    }
    drop.forEach(k => localStorage.removeItem(k));
  })();

  buildReel();

  document.addEventListener("gesturestart", e=>e.preventDefault());

  // Offline support when hosted (https)
  if("serviceWorker" in navigator){
    window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
  }
})();
</script>
</body>
